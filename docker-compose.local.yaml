services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: evolution-api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USERNAME:-evolution}:${POSTGRES_PASSWORD:-evolution}@postgres:5432/${POSTGRES_DATABASE:-evolution_db}?schema=evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-local

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evolution_db}
      POSTGRES_USER: ${POSTGRES_USERNAME:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-local

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - evolution-local

volumes:
  evolution_instances:
  postgres_data:
  redis_data:

networks:
  evolution-local:
    driver: bridge